spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/raisetimeline_dev}
    username: ${DB_USERNAME:raisetimeline}
    password: ${DB_PASSWORD:password}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration

app:
  jwt:
    secret: ${JWT_SECRET:dev_secret_key_must_be_at_least_32_characters_long}
    expiration-ms: 86400000  # 24 hours

server:
  port: 8080
