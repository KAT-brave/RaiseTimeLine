spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/raisetimeline_dev}
    username: ${DB_USERNAME:raisetimeline}
    password: ${DB_PASSWORD:password}
    driver-class-name: org.postgresql.Driver
  flyway:
    enabled: true
    locations: classpath:db/migration

mybatis:
  mapper-locations: classpath:mapper/*.xml
  configuration:
    map-underscore-to-camel-case: true

app:
  jwt:
    secret: ${JWT_SECRET:dev_secret_key_must_be_at_least_32_characters_long}
    expiration-ms: 86400000  # 24 hours

server:
  port: 8080
