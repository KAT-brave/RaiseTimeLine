services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: raisetimeline_dev
      POSTGRES_USER: raisetimeline
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U raisetimeline -d raisetimeline_dev"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "8080:8080"
    environment:
      DB_URL: jdbc:postgresql://db:5432/raisetimeline_dev
      DB_USERNAME: raisetimeline
      DB_PASSWORD: password
      JWT_SECRET: dev_secret_key_must_be_at_least_32_characters_long
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
